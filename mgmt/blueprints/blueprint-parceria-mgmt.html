(function(){
  var container=document.getElementById('mood-container');if(!container)return;
  var moods=STEPS.map(function(s){return s.mood;});
  var w=N*COL_W,h=80,padTop=12,padBot=12,plotH=h-padTop-padBot;
  function moodY(v){return padTop+plotH-((v-1)/4)*plotH;}
  function stepX(i){return(i+0.5)*COL_W;}
  var points=moods.map(function(m,i){return{x:stepX(i),y:moodY(m)};});
  function catmullRomToBezier(pts){if(pts.length<2)return '';var d='M '+pts[0].x+' '+pts[0].y;for(var i=0;i<pts.length-1;i++){var p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[Math.min(i+1,pts.length-1)],p3=pts[Math.min(i+2,pts.length-1)],tension=0.35;d+=' C '+(p1.x+(p2.x-p0.x)*tension)+','+(p1.y+(p2.y-p0.y)*tension)+' '+(p2.x-(p3.x-p1.x)*tension)+','+(p2.y-(p3.y-p1.y)*tension)+' '+p2.x+','+p2.y;}return d;}
  var pathD=catmullRomToBezier(points);
  var fillD=pathD+' L '+points[points.length-1].x+','+h+' L '+points[0].x+','+h+' Z';
  var svg='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="display:block">';
  svg+='<defs><linearGradient id="moodGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF7A0D" stop-opacity="0.25"/><stop offset="100%" stop-color="#FF7A0D" stop-opacity="0.03"/></linearGradient></defs>';
  [1,2,3,4,5].forEach(function(v){var y=moodY(v);svg+='<line x1="0" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="#E5DDDA" stroke-width="0.5" stroke-dasharray="4,4"/>';});
  svg+='<text x="4" y="'+(moodY(5)-2)+'" font-size="10" fill="#9E9E9E" font-family="Helvetica Neue,Arial">\uD83D\uDE0A 5</text>';
  svg+='<text x="4" y="'+(moodY(3)+4)+'" font-size="10" fill="#9E9E9E" font-family="Helvetica Neue,Arial">\uD83D\uDE10 3</text>';
  svg+='<text x="4" y="'+(moodY(1)+4)+'" font-size="10" fill="#9E9E9E" font-family="Helvetica Neue,Arial">\uD83D\uDE24 1</text>';
  for(var gi=1;gi<N;gi++)svg+='<line x1="'+(gi*COL_W)+'" y1="0" x2="'+(gi*COL_W)+'" y2="'+h+'" stroke="#E5DDDA" stroke-width="0.5"/>';
  var cumulative=0;PHASES.forEach(function(ph,idx){if(idx>0)svg+='<line x1="'+(cumulative*COL_W)+'" y1="0" x2="'+(cumulative*COL_W)+'" y2="'+h+'" stroke="#BDBDBD" stroke-width="1.5"/>';cumulative+=ph.count;});
  svg+='<path d="'+fillD+'" fill="url(#moodGrad)"/>';
  svg+='<path d="'+pathD+'" fill="none" stroke="#FF7A0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  points.forEach(function(pt,idx){var m=moods[idx];var dotColor=m<=2?'#C62828':(m>=4?'#2E7D32':'#FF7A0D');if(STEPS[idx].isWait)svg+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="10" fill="#C62828" fill-opacity="0.12"/>';svg+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="5" fill="'+dotColor+'" stroke="#fff" stroke-width="1.5"/>';svg+='<text x="'+pt.x+'" y="'+(pt.y-9)+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+dotColor+'" font-family="Helvetica Neue,Arial">'+m+'</text>';});
  svg+='</svg>';
  container.innerHTML=svg;
})();
